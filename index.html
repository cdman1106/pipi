<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈴峯ぴぴ Special Contents</title>
    
    <link rel="preload" as="image" href="https://www.dropbox.com/scl/fi/4n1d1xeh2abvwzkm7hkwa/122-131.png?rlkey=gsmqn4lx3pgwan2twthd8r5pk&raw=1">
    <link rel="preload" as="image" href="https://www.dropbox.com/scl/fi/9cs99ywk7hk0kcwbb3jcb/pipi_header.png?rlkey=6pezu3dpc41hvhlhzgbyxzar4&raw=1">
    <link rel="preload" as="image" href="https://www.dropbox.com/scl/fi/izn1nzo0ietejd1lcr6bw/.jpg?rlkey=gac47khfepx4he019w4zf8d0w&raw=1">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --apex-blue: #00f3ff;
            --pipi-blue: #b0e0e6;
            --pipi-pink: #ffc0cb;
            --bg-dark: #0b0e11;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        /* --- ローディング画面 --- */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
            background-color: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200;
            transition: opacity 0.5s ease;
        }

        .loading-pack {
            width: 50px; height: 50px;
            background-color: #222;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            position: relative;
            animation: pack-rotate 2s infinite linear;
        }
        .loading-pack::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 12px; height: 12px;
            background-color: var(--apex-blue); border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--apex-blue);
        }
        @keyframes pack-rotate { 100% { transform: rotateY(360deg); } }

        /* --- イントロ画面 --- */
        #intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
            background-image: url('https://www.dropbox.com/scl/fi/4n1d1xeh2abvwzkm7hkwa/122-131.png?rlkey=gsmqn4lx3pgwan2twthd8r5pk&raw=1');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; transition: opacity 0.8s ease;
            pointer-events: none;
        }
        #intro.active { opacity: 1; pointer-events: auto; }

        .signal-button {
            position: relative; z-index: 10; display: flex; align-items: center;
            padding: 18px 30px; background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--apex-blue); border-radius: 8px;
            cursor: pointer; animation: pulse 2s infinite;
        }
        @keyframes pulse { 50% { transform: scale(1.05); box-shadow: 0 0 25px var(--apex-blue); } }

        .signal-icon {
            width: 24px; height: 24px; background-color: var(--apex-blue);
            clip-path: polygon(50% 0%, 100% 50%, 80% 50%, 80% 100%, 20% 100%, 20% 50%, 0% 50%);
            margin-right: 12px;
        }

        /* --- コンテンツ画面 --- */
        #content {
            display: none; width: 100%; min-height: 100dvh;
            background-color: var(--bg-dark); flex-direction: column; align-items: center;
            opacity: 0; transition: opacity 0.8s ease; padding-bottom: 80px;
        }

        .content-img { width: 100%; max-width: 600px; height: auto; display: block; }

        .shorts-container {
            width: 85%; max-width: 340px; aspect-ratio: 9/16; margin: 30px 0;
            border: 3px solid var(--pipi-pink); border-radius: 12px; overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 192, 203, 0.3);
        }

        .sns-area { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .sns-card { display: flex; align-items: center; padding: 14px; background: #16191d; border-left: 5px solid var(--pipi-blue); text-decoration: none; color: white; border-radius: 6px; }
        .sns-card.x { border-color: #1DA1F2; }

        .ripple { position: fixed; border-radius: 50%; background: rgba(0, 243, 255, 0.6); transform: scale(0); animation: ripple-ani 0.7s ease-out; pointer-events: none; z-index: 101; }
        @keyframes ripple-ani { to { transform: scale(30); opacity: 0; } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loading-pack"></div>
        <p style="letter-spacing: 2px; font-size: 14px; margin-top: 15px;">SYNCHRONIZING...</p>
    </div>

    <div id="intro">
        <div class="signal-button" id="btn-start">
            <div class="signal-icon"></div>
            <div class="signal-text" style="font-weight: 700;">ここを探索する</div>
        </div>
    </div>

    <div id="content">
        <img id="img1" src="https://www.dropbox.com/scl/fi/9cs99ywk7hk0kcwbb3jcb/pipi_header.png?rlkey=6pezu3dpc41hvhlhzgbyxzar4&raw=1" class="content-img" alt="Header">

        <div class="shorts-container">
            <iframe id="pipi-video" src="https://www.youtube.com/embed/TFxDIzHL1cQ?rel=0&enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen style="width:100%; height:100%; border:none;"></iframe>
        </div>

        <img id="img2" src="https://www.dropbox.com/scl/fi/izn1nzo0ietejd1lcr6bw/.jpg?rlkey=gac47khfepx4he019w4zf8d0w&raw=1" class="content-img" alt="Sub Image">

        <div class="sns-area">
            <a href="https://x.com/pipipi_1205" class="sns-card x" target="_blank">
                <div style="width:40px; font-weight:bold; font-size:20px;">X</div>
                <div><div style="font-size:11px; opacity:0.6;">Follow Me</div><div style="font-weight:bold;">@pipipi_1205</div></div>
            </a>
            <a href="https://youtube.com/channel/UCWAzVata5OrkI-b-5eYBuZA" class="sns-card" target="_blank">
                <div style="width:40px; font-weight:bold; font-size:20px; color:#ff0000;">YT</div>
                <div><div style="font-size:11px; opacity:0.6;">Subscribe</div><div style="font-weight:bold;">鈴峯ぴぴ / Suzumine Pipi</div></div>
            </a>
        </div>
    </div>

    <audio id="audio-ping" src="https://www.dropbox.com/scl/fi/ro1oj07y08itq12o0jf9n/apex-legends-ping.mp3?rlkey=14m5p3s9oz0pkwuxiqjbsyceb&raw=1" preload="auto"></audio>

    <script>
        const images = [
            'https://www.dropbox.com/scl/fi/4n1d1xeh2abvwzkm7hkwa/122-131.png?rlkey=gsmqn4lx3pgwan2twthd8r5pk&raw=1',
            'https://www.dropbox.com/scl/fi/9cs99ywk7hk0kcwbb3jcb/pipi_header.png?rlkey=6pezu3dpc41hvhlhzgbyxzar4&raw=1',
            'https://www.dropbox.com/scl/fi/izn1nzo0ietejd1lcr6bw/.jpg?rlkey=gac47khfepx4he019w4zf8d0w&raw=1'
        ];

        let loadedCount = 0;
        images.forEach(url => {
            const img = new Image();
            img.src = url;
            img.onload = () => {
                loadedCount++;
                if (loadedCount === images.length) {
                    // すべての画像が読み込まれたら開始
                    setTimeout(() => {
                        document.getElementById('loading').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('loading').classList.add('hidden');
                            document.getElementById('intro').classList.add('active');
                        }, 500);
                    }, 1000);
                }
            };
        });

        document.getElementById('btn-start').addEventListener('click', (e) => {
            document.getElementById('audio-ping').play().catch(()=>{});
            const ripple = document.createElement('div');
            ripple.classList.add('ripple');
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);

            setTimeout(() => {
                document.getElementById('intro').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro').classList.add('hidden');
                    document.getElementById('content').style.display = 'flex';
                    document.body.style.overflow = 'auto';
                    setTimeout(() => {
                        document.getElementById('content').style.opacity = '1';
                        document.getElementById('pipi-video').src += "&autoplay=1";
                    }, 50);
                }, 600);
            }, 500);
        });
    </script>
</body>
</html>
